<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sharbat</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #0f3d2e, #000);
  color: #fff;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card .info {
  padding: 8px;
}

.price {
  color: #4caf50;
  font-weight: bold;
}

/* ADMIN */
.admin {
  display: none;
  padding: 10px;
}

.admin input, .admin textarea {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #1f6f54;
  color: #fff;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">Sharbat</div>

<div id="app">
  <div class="grid" id="grid"></div>
</div>

<div id="admin" class="admin">
  <h2>Admin</h2>

  <input type="text" id="title" placeholder="Название">
  <input type="text" id="price" placeholder="Цена">
  <textarea id="description" placeholder="Описание"></textarea>
  <input type="file" id="photo">

  <button onclick="addItem()">Добавить</button>
</div>

<script>
const isAdmin = location.pathname === '/admin';

if (isAdmin) {
  document.getElementById('admin').style.display = 'block';
  document.getElementById('app').style.display = 'none';
}

// загрузка карточек
async function load() {
  const res = await fetch('/api/items');
  const data = await res.json();

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  data.forEach(item => {
    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${item.photo}" />
      <div class="info">
        <div>${item.title}</div>
        <div class="price">${item.price}</div>
        <div>${item.description}</div>
      </div>
    `;

    grid.appendChild(el);
  });
}

load();

// добавление
async function addItem() {
  const formData = new FormData();

  formData.append('title', document.getElementById('title').value);
  formData.append('price', document.getElementById('price').value);
  formData.append('description', document.getElementById('description').value);
  formData.append('photo', document.getElementById('photo').files[0]);

  await fetch('/api/items', {
    method: 'POST',
    body: formData
  });

  alert('Добавлено');
}
</script>

</body>
</html>
